<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Argon Industries — a digital product studio in Osogbo, Nigeria, pairing product strategy with full-stack development." />
    <title>Argon Industries | Product Strategy + Full-Stack Build</title>

    <!-- Resource hints: start the connection to Google Fonts' servers
         early, before the browser even parses the font <link> below.
         Saves a DNS + TLS round trip, which matters most on 3G/4G. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Only the site-wide fonts (used on every page) live here.
         Fraunces is only used on /portfolio, so it's loaded dynamically
         from Portfolio.tsx instead — no point every homepage visitor
         downloading a serif font they'll never see. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
